<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Compose Email</title>
  <style>
    :root {
      --bg: var(--color-background-primary, light-dark(#ffffff, #171717));
      --bg-secondary: var(--color-background-secondary, light-dark(#f5f5f5, #262626));
      --text: var(--color-text-primary, light-dark(#171717, #fafafa));
      --text-secondary: var(--color-text-secondary, light-dark(#525252, #a3a3a3));
      --border: var(--color-border-primary, light-dark(#e5e5e5, #404040));
      --accent: var(--color-accent-primary, light-dark(#2563eb, #60a5fa));
      --font: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif);
      --radius: var(--border-radius-md, 8px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      padding: 16px;
      line-height: 1.5;
    }
    .form-group { margin-bottom: 12px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 200px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      justify-content: flex-end;
    }
    button {
      padding: 8px 20px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      display: none;
    }
    .status.error {
      display: block;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }
    .status.success {
      display: block;
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }
    .toggle-btn {
      font-size: 12px;
      padding: 2px 8px;
      border: none;
      background: none;
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="form-group">
    <label for="to">To</label>
    <input type="text" id="to" placeholder="recipient@example.com" />
  </div>
  <div id="cc-bcc-toggle" style="margin-bottom: 12px;">
    <button type="button" class="toggle-btn" id="toggle-cc-bcc-btn">Show CC/BCC</button>
  </div>
  <div id="cc-bcc-fields" class="hidden">
    <div class="row">
      <div class="form-group">
        <label for="cc">CC</label>
        <input type="text" id="cc" placeholder="cc@example.com" />
      </div>
      <div class="form-group">
        <label for="bcc">BCC</label>
        <input type="text" id="bcc" placeholder="bcc@example.com" />
      </div>
    </div>
  </div>
  <div class="form-group">
    <label for="subject">Subject</label>
    <input type="text" id="subject" placeholder="Email subject" />
  </div>
  <div class="form-group">
    <label for="body">Body</label>
    <textarea id="body" placeholder="Write your email here..."></textarea>
  </div>
  <div class="actions">
    <button type="button" id="save-draft-btn">Save Draft</button>
    <button type="button" class="primary" id="send-btn">Send</button>
  </div>
  <div id="status" class="status"></div>
  <script type="module" src="./compose.ts"></script>
</body>
</html>
